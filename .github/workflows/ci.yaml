name: Uber Fare CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          uv pip install --system \
            pandas numpy scikit-learn \
            "dvc[s3]" dagshub mlflow python-dotenv

      - name: Configure DVC Remote (DagsHub S3)
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          # Override the local default remote with the DagsHub cloud remote
          dvc remote add -d dagshub_remote s3://dvc --force
          dvc remote modify dagshub_remote endpointurl https://dagshub.com/RedLordezh7Venom/uberfareMLOPs.s3
          dvc remote modify dagshub_remote access_key_id $CAPSTONE_TEST
          dvc remote modify dagshub_remote secret_access_key $CAPSTONE_TEST

      - name: Pull Raw Data
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          dvc pull data/raw/uber.csv.dvc

      - name: Run DVC Pipeline
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          dvc repro
